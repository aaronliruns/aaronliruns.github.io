<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lobster Raiser - Aaron Li</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            padding: 2rem;
        }
        
        .logo {
            width: 200px;
            height: 200px;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
            border-radius: 50%;
            box-shadow: 0 0 30px rgba(255, 107, 107, 0.3);
            object-fit: cover;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
        
        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b6b, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #888888;
            margin-bottom: 2rem;
        }
        
        .footer {
            position: fixed;
            bottom: 2rem;
            color: #444;
            font-size: 0.9rem;
        }
        
        a {
            color: #ff6b6b;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <img class="logo" src="https://images.unsplash.com/photo-1559742811-822873691df8?w=400&h=400&fit=crop" alt="Cute Lobster">
        <h1>LOBSTER RAISER</h1>
        <p class="subtitle">Aaron Li</p>
    </div>
    <div class="footer">
        Last updated: 2026-03-15 22:38:48 | Powered by <a href="https://openclaw.ai">OpenClaw</a>
    </div>
</body>
</html>
