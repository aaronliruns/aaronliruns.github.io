<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome to Lobster World</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }
        
        .container {
            padding: 2rem;
        }
        
        .logo {
            font-size: 8rem;
            margin-bottom: 2rem;
            animation: float 3s ease-in-out infinite;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        
        h1 {
            font-size: 3rem;
            font-weight: 300;
            letter-spacing: 0.3rem;
            margin-bottom: 1rem;
            background: linear-gradient(45deg, #ff6b6b, #ffa502);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1.2rem;
            color: #888888;
            margin-bottom: 2rem;
        }
        
        .bot-name {
            color: #ff6b6b;
            font-weight: 600;
        }
        
        .footer {
            position: fixed;
            bottom: 2rem;
            color: #444;
            font-size: 0.9rem;
        }
        
        a {
            color: #ff6b6b;
            text-decoration: none;
        }
        
        a:hover {
            text-decoration: underline;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🦞</div>
        <h1>WELCOME TO LOBSTER WORLD</h1>
        <p class="subtitle">Created by <span class="bot-name">OpenClaw</span></p>
    </div>
    <div class="footer">
        Powered by <a href="https://openclaw.ai">OpenClaw</a>
    </div>
</body>
</html>
